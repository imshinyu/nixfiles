# : Manager [[[

[manager]
cwd = { fg = "#ede0d3" }

# Tab
tab_active = { fg = "#442b00", bg = "#ffd7a0", bold = true }
tab_inactive = { fg = "#ffddb1", bg = "#291800" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#58c6ff", bg = "#58c6ff" }
marker_cut = { fg = "#bee9ff", bg = "#bee9ff" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#b1e5ff", bg = "#b1e5ff" }

# Count
count_copied = { fg = "#001f2a", bg = "#bee9ff" }
count_cut = { fg = "#001f2a", bg = "#bee9ff" }
count_selected = { fg = "#442b00", bg = "#b1e5ff" }

# Border
border_symbol = "│"
border_style  = { fg = "#ffba49" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#442b00", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#ffd7a0", fg = "#442b00", bold = true }
normal_alt  = { bg = "#514535", fg = "#d6c4af" }

# Select mode
select_main = { bg = "#e7c08a", fg = "#432c03", bold = true }
select_alt  = { bg = "#514535", fg = "#d6c4af" }

# Unset mode
unset_main = { bg = "#b1e5ff", fg = "#003546", bold = true }
unset_alt  = { bg = "#514535", fg = "#d6c4af" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#ffd7a0", bg = "#3f382f" }
progress_error = { fg = "#ffb4ab", bg = "#3f382f" }

# Permissions
permissions_t = { fg = "#b37725" }
permissions_w = { fg = "#18b2ff" }
permissions_x = { fg = "#ff2b12" }
permissions_r = { fg = "#25b5ff" }
permissions_s = { fg = "#ff9a18" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#ffd7a0" }
active = { fg = "#b1e5ff", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#ffd7a0" }
value = { fg = "#ede0d3" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#ffd7a0", bg = "#442b00" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#ffd7a0" }
title = {}
hovered = { fg = "#bee9ff", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#3f382f" }
cand = { fg = "#ffd7a0" }
rest = { fg = "#442b00" }
desc = { fg = "#ede0d3" }
separator = " ▶ "
separator_style = { fg = "#ede0d3" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#ede0d3" }
run = { fg = "#ede0d3" }
footer = { fg = "#432c03", bg = "#e7c08a" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#b1e5ff" }
title_warn = { fg = "#ffd7a0" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#ede0d3" },
    { name = "*/", fg = "#ffba49" },
]

# : ]]]
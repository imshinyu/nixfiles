# Helix Theme Template using Material You with improved contrast

# --- Syntax Elements ---

"attribute" = "#b7c4ff"
"type" = "#bfc5e7"
"type.enum.variant" = "#bfc5e7"
"constructor" = "#dde1ff"

"constant" = "#f7bc67"
"constant.character" = "#f7bc67"
"constant.character.escape" = "#7e5300"

"string" = "#b7c4ff"
"string.regexp" = "#7e5300"
"string.special" = "#dde1ff"
"string.special.symbol" = "#ffb4ab"

"comment" = { fg = "#c5c5d2", modifiers = ["italic"] }

"variable" = "#e3e1e8"
"variable.parameter" = { fg = "#93000a", modifiers = ["italic"] }
"variable.builtin" = "#ffb4ab"
"variable.other.member" = "#b7c4ff"

"label" = "#dde1ff"

"punctuation" = "#c5c5d2"
"punctuation.special" = "#bfc5e7"

"keyword" = "#b7c4ff"
"keyword.control.conditional" = { fg = "#b7c4ff", modifiers = ["italic"] }

"operator" = "#bfc5e7"

"function" = "#b7c4ff"
"function.macro" = "#45579d"

"tag" = "#b7c4ff"
"namespace" = { fg = "#bfc5e7", modifiers = ["italic"] }

"special" = "#b7c4ff"

# --- Markup ---

"markup.heading.1" = "#ffb4ab"
"markup.heading.2" = "#b7c4ff"
"markup.heading.3" = "#bfc5e7"
"markup.heading.4" = "#f7bc67"
"markup.heading.5" = "#dde1ff"
"markup.heading.6" = "#2f4287"

"markup.list" = "#bfc5e7"
"markup.list.unchecked" = "#c5c5d2"
"markup.list.checked" = "#dde1ff"

"markup.bold" = { fg = "#b7c4ff", modifiers = ["bold"] }
"markup.italic" = { fg = "#bfc5e7", modifiers = ["italic"] }

"markup.link.url" = { fg = "#b7c4ff", modifiers = ["italic", "underlined"] }
"markup.link.text" = "#dde1ff"
"markup.link.label" = "#f7bc67"
"markup.raw" = "#ffffff"
"markup.quote" = "#7e5300"

# --- Diff ---

"diff.plus" = "#f7bc67"
"diff.minus" = "#ffb4ab"
"diff.delta" = "#b7c4ff"

# --- UI Elements ---

"ui.background" = { fg = "#e3e1e8", bg = "#121318" }

"ui.linenr" = { fg = "#c5c5d2" }
"ui.linenr.selected" = { fg = "#dde1ff" }

"ui.statusline" = { fg = "#ffffff", bg = "none" }
"ui.statusline.inactive" = { fg = "#c5c5d2", bg = "none" }
"ui.statusline.normal" = { fg = "#121318", bg = "none", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "#121318", bg = "none", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "#121318", bg = "none", modifiers = ["bold"] }

"ui.popup" = { fg = "#e3e1e8", bg = "none" }
"ui.window" = { fg = "#c5c5d2" }
"ui.help" = { fg = "#c5c5d2", bg = "none" }

"ui.bufferline" = { fg = "#c5c5d2", bg = "none" }
"ui.bufferline.active" = { fg = "#162a6f", bg = "#b7c4ff", underline = { color = "#b7c4ff", style = "line" } }
"ui.bufferline.background" = { bg = "none" }

"ui.text" = "#e3e1e8"
"ui.text.focus" = { fg = "#b7c4ff", bg = "none", modifiers = ["bold"] }
"ui.text.inactive" = { fg = "#c5c5d2" }
"ui.text.directory" = { fg = "#b7c4ff" }

"ui.virtual" = "#c5c5d2"
"ui.virtual.ruler" = { bg = "none" }
"ui.virtual.indent-guide" = "#1b1b20"
"ui.virtual.inlay-hint" = { fg = "#c5c5d2", bg = "none" }
"ui.virtual.jump-label" = { fg = "#45579d", modifiers = ["bold"] }

"ui.selection" = {fg = "#162a6f", bg = "#b7c4ff" }
"ui.cursor" = { fg = "#121318", bg = "#ffffff" }
"ui.cursor.primary" = { fg = "#121318", bg = "#dde1ff" }
"ui.cursor.match" = { fg = "#ffffff", modifiers = ["bold"] }

"ui.highlight" = { bg = "#414864", modifiers = ["bold"] }

"ui.menu" = { fg = "#e3e1e8", bg = "none" }
"ui.menu.selected" = { fg = "#b7c4ff", bg = "none", modifiers = ["bold"] }

# --- Diagnostics ---

"diagnostic.error" = { fg = "#ffb4ab", underline = { color = "#ffb4ab", style = "curl" } }
"diagnostic.warning" = { fg = "#bfc5e7", underline = { color = "#bfc5e7", style = "curl" } }
"diagnostic.info" = { fg = "#f7bc67", underline = { color = "#f7bc67", style = "curl" } }
"diagnostic.hint" = { fg = "#7e5300", underline = { color = "#7e5300", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }

# --- Fallbacks (non-template usage) ---

error = "#ffb4ab"
warning = "#f7bc67"
info = "#b7c4ff"
hint = "#bfc5e7"

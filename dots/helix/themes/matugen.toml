# Helix Theme Template using Material You with improved contrast

# --- Syntax Elements ---

"attribute" = "#ffd7a0"
"type" = "#e7c08a"
"type.enum.variant" = "#e7c08a"
"constructor" = "#ffddb1"

"constant" = "#b1e5ff"
"constant.character" = "#b1e5ff"
"constant.character.escape" = "#53cfff"

"string" = "#ffd7a0"
"string.regexp" = "#53cfff"
"string.special" = "#ffddb1"
"string.special.symbol" = "#ffb4ab"

"comment" = { fg = "#d6c4af", modifiers = ["italic"] }

"variable" = "#ede0d3"
"variable.parameter" = { fg = "#93000a", modifiers = ["italic"] }
"variable.builtin" = "#ffb4ab"
"variable.other.member" = "#ffd7a0"

"label" = "#ffddb1"

"punctuation" = "#d6c4af"
"punctuation.special" = "#e7c08a"

"keyword" = "#ffd7a0"
"keyword.control.conditional" = { fg = "#ffd7a0", modifiers = ["italic"] }

"operator" = "#e7c08a"

"function" = "#ffd7a0"
"function.macro" = "#fbb43e"

"tag" = "#ffd7a0"
"namespace" = { fg = "#e7c08a", modifiers = ["italic"] }

"special" = "#ffd7a0"

# --- Markup ---

"markup.heading.1" = "#ffb4ab"
"markup.heading.2" = "#ffd7a0"
"markup.heading.3" = "#e7c08a"
"markup.heading.4" = "#b1e5ff"
"markup.heading.5" = "#ffddb1"
"markup.heading.6" = "#624000"

"markup.list" = "#e7c08a"
"markup.list.unchecked" = "#d6c4af"
"markup.list.checked" = "#ffddb1"

"markup.bold" = { fg = "#ffd7a0", modifiers = ["bold"] }
"markup.italic" = { fg = "#e7c08a", modifiers = ["italic"] }

"markup.link.url" = { fg = "#ffd7a0", modifiers = ["italic", "underlined"] }
"markup.link.text" = "#ffddb1"
"markup.link.label" = "#b1e5ff"
"markup.raw" = "#003849"
"markup.quote" = "#53cfff"

# --- Diff ---

"diff.plus" = "#b1e5ff"
"diff.minus" = "#ffb4ab"
"diff.delta" = "#ffd7a0"

# --- UI Elements ---

"ui.background" = { fg = "#ede0d3", bg = "#18120b" }

"ui.linenr" = { fg = "#d6c4af" }
"ui.linenr.selected" = { fg = "#ffddb1" }

"ui.statusline" = { fg = "#472d00", bg = "none" }
"ui.statusline.inactive" = { fg = "#d6c4af", bg = "none" }
"ui.statusline.normal" = { fg = "#18120b", bg = "none", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "#18120b", bg = "none", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "#18120b", bg = "none", modifiers = ["bold"] }

"ui.popup" = { fg = "#ede0d3", bg = "none" }
"ui.window" = { fg = "#d6c4af" }
"ui.help" = { fg = "#d6c4af", bg = "none" }

"ui.bufferline" = { fg = "#d6c4af", bg = "none" }
"ui.bufferline.active" = { fg = "#442b00", bg = "#ffd7a0", underline = { color = "#ffd7a0", style = "line" } }
"ui.bufferline.background" = { bg = "none" }

"ui.text" = "#ede0d3"
"ui.text.focus" = { fg = "#ffd7a0", bg = "none", modifiers = ["bold"] }
"ui.text.inactive" = { fg = "#d6c4af" }
"ui.text.directory" = { fg = "#ffd7a0" }

"ui.virtual" = "#d6c4af"
"ui.virtual.ruler" = { bg = "none" }
"ui.virtual.indent-guide" = "#211b13"
"ui.virtual.inlay-hint" = { fg = "#d6c4af", bg = "none" }
"ui.virtual.jump-label" = { fg = "#fbb43e", modifiers = ["bold"] }

"ui.selection" = {fg = "#442b00", bg = "#ffd7a0" }
"ui.cursor" = { fg = "#18120b", bg = "#472d00" }
"ui.cursor.primary" = { fg = "#18120b", bg = "#ffddb1" }
"ui.cursor.match" = { fg = "#472d00", modifiers = ["bold"] }

"ui.highlight" = { bg = "#5f4419", modifiers = ["bold"] }

"ui.menu" = { fg = "#ede0d3", bg = "none" }
"ui.menu.selected" = { fg = "#ffd7a0", bg = "none", modifiers = ["bold"] }

# --- Diagnostics ---

"diagnostic.error" = { fg = "#ffb4ab", underline = { color = "#ffb4ab", style = "curl" } }
"diagnostic.warning" = { fg = "#e7c08a", underline = { color = "#e7c08a", style = "curl" } }
"diagnostic.info" = { fg = "#b1e5ff", underline = { color = "#b1e5ff", style = "curl" } }
"diagnostic.hint" = { fg = "#53cfff", underline = { color = "#53cfff", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }

# --- Fallbacks (non-template usage) ---

error = "#ffb4ab"
warning = "#b1e5ff"
info = "#ffd7a0"
hint = "#e7c08a"

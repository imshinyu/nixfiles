# Helix Theme Template using Material You with improved contrast

# --- Syntax Elements ---

"attribute" = "#fff7e1"
"type" = "#d0c6a7"
"type.enum.variant" = "#d0c6a7"
"constructor" = "#f3e39e"

"constant" = "#f8f6ff"
"constant.character" = "#f8f6ff"
"constant.character.escape" = "#d4d8ff"

"string" = "#fff7e1"
"string.regexp" = "#d4d8ff"
"string.special" = "#f3e39e"
"string.special.symbol" = "#ffb4ab"

"comment" = { fg = "#ccc6b6", modifiers = ["italic"] }

"variable" = "#e7e2da"
"variable.parameter" = { fg = "#93000a", modifiers = ["italic"] }
"variable.builtin" = "#ffb4ab"
"variable.other.member" = "#fff7e1"

"label" = "#f3e39e"

"punctuation" = "#ccc6b6"
"punctuation.special" = "#d0c6a7"

"keyword" = "#fff7e1"
"keyword.control.conditional" = { fg = "#fff7e1", modifiers = ["italic"] }

"operator" = "#d0c6a7"

"function" = "#fff7e1"
"function.macro" = "#ebdb97"

"tag" = "#fff7e1"
"namespace" = { fg = "#d0c6a7", modifiers = ["italic"] }

"special" = "#fff7e1"

# --- Markup ---

"markup.heading.1" = "#ffb4ab"
"markup.heading.2" = "#fff7e1"
"markup.heading.3" = "#d0c6a7"
"markup.heading.4" = "#f8f6ff"
"markup.heading.5" = "#f3e39e"
"markup.heading.6" = "#514711"

"markup.list" = "#d0c6a7"
"markup.list.unchecked" = "#ccc6b6"
"markup.list.checked" = "#f3e39e"

"markup.bold" = { fg = "#fff7e1", modifiers = ["bold"] }
"markup.italic" = { fg = "#d0c6a7", modifiers = ["italic"] }

"markup.link.url" = { fg = "#fff7e1", modifiers = ["italic", "underlined"] }
"markup.link.text" = "#f3e39e"
"markup.link.label" = "#f8f6ff"
"markup.raw" = "#3c4160"
"markup.quote" = "#d4d8ff"

# --- Diff ---

"diff.plus" = "#f8f6ff"
"diff.minus" = "#ffb4ab"
"diff.delta" = "#fff7e1"

# --- UI Elements ---

"ui.background" = { fg = "#e7e2da", bg = "#15130f" }

"ui.linenr" = { fg = "#ccc6b6" }
"ui.linenr.selected" = { fg = "#f3e39e" }

"ui.statusline" = { fg = "#4d430e", bg = "none" }
"ui.statusline.inactive" = { fg = "#ccc6b6", bg = "none" }
"ui.statusline.normal" = { fg = "#15130f", bg = "none", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "#15130f", bg = "none", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "#15130f", bg = "none", modifiers = ["bold"] }

"ui.popup" = { fg = "#e7e2da", bg = "none" }
"ui.window" = { fg = "#ccc6b6" }
"ui.help" = { fg = "#ccc6b6", bg = "none" }

"ui.bufferline" = { fg = "#ccc6b6", bg = "none" }
"ui.bufferline.active" = { fg = "#393000", bg = "#fff7e1", underline = { color = "#fff7e1", style = "line" } }
"ui.bufferline.background" = { bg = "none" }

"ui.text" = "#e7e2da"
"ui.text.focus" = { fg = "#fff7e1", bg = "none", modifiers = ["bold"] }
"ui.text.inactive" = { fg = "#ccc6b6" }
"ui.text.directory" = { fg = "#fff7e1" }

"ui.virtual" = "#ccc6b6"
"ui.virtual.ruler" = { bg = "none" }
"ui.virtual.indent-guide" = "#1d1b17"
"ui.virtual.inlay-hint" = { fg = "#ccc6b6", bg = "none" }
"ui.virtual.jump-label" = { fg = "#ebdb97", modifiers = ["bold"] }

"ui.selection" = {fg = "#393000", bg = "#fff7e1" }
"ui.cursor" = { fg = "#15130f", bg = "#4d430e" }
"ui.cursor.primary" = { fg = "#15130f", bg = "#f3e39e" }
"ui.cursor.match" = { fg = "#4d430e", modifiers = ["bold"] }

"ui.highlight" = { bg = "#4f4931", modifiers = ["bold"] }

"ui.menu" = { fg = "#e7e2da", bg = "none" }
"ui.menu.selected" = { fg = "#fff7e1", bg = "none", modifiers = ["bold"] }

# --- Diagnostics ---

"diagnostic.error" = { fg = "#ffb4ab", underline = { color = "#ffb4ab", style = "curl" } }
"diagnostic.warning" = { fg = "#d0c6a7", underline = { color = "#d0c6a7", style = "curl" } }
"diagnostic.info" = { fg = "#f8f6ff", underline = { color = "#f8f6ff", style = "curl" } }
"diagnostic.hint" = { fg = "#d4d8ff", underline = { color = "#d4d8ff", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }

# --- Fallbacks (non-template usage) ---

error = "#ffb4ab"
warning = "#f8f6ff"
info = "#fff7e1"
hint = "#d0c6a7"

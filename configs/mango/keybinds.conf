# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER+SHIFT,x,reload_config
# bind=SUPER+SHIFT,x,spawn_shell,mmsg -d 'border_radius=10'

# Programs
# bind=SUPER,r,spawn_shell,qs ipc call launcher opencloselauncher
bind=SUPER,r,spawn_shell,rofi -show drun
bind=SUPER,q,spawn_shell,foot
bind=SUPER,e,spawn_shell,foot yazi
bind=SUPER,w,spawn_shell,qs ipc call panel openclosepanel
bind=SUPER,slash,spawn_shell,qs ipc call settings openclosesettings
# bind=Alt,v,spawn_shell,kitty -e clipse
bind=Alt,v,spawn_shell,copyq toggle
bind=SUPER+SHIFT,n,spawn_shell,hyprpicker -a
# bind=SUPER+SHIFT,s,spawn_shell,wayfreeze --hide-cursor & PID=$!; sleep .1; grim -g "$(slurp)" - | wl-copy; kill $PID && notify-send -e "Screenshot Taken"
bind=SUPER+SHIFT,s,spawn_shell,wayfreeze --hide-cursor & PID=$!;sleep .1; hyprshot -m region -o ~/Pictures/Screenshots - | wl-copy -p; kill $PID
bind=SUPER,s,spawn_shell,hyprshot -m output -o ~/Pictures/Screenshots
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set +5%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 5%-
bind=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 0.1+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 0.1-
bind=NONE,F6,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1-
bind=NONE,F7,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1+
bind=NONE,F6,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1-
bind=NONE,F8,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle



# exit
bind=SUPER,m,quit
bind=SUPER,c,killclient,

# switch window focus
bind=SUPER,Tab,focusstack,next
# bind=SUPER,Right,focusstack,prev
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=SUPER,Tab,toggleoverview,
bind=SUPER,v,togglefloating,
bind=SUPER,f,set_proportion,1
bind=SUPER+SHIFT,f,togglefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout
# bind=SUPER+SHIFT,R,set_proportion,1.0
bind=SUPER+SHIFT,R,switch_proportion_preset

# switch layout
bind=SUPER,n,switch_layout

# tag switch
bind=SUPER,Up,viewtoleft,0
#bind=CTRL,Left,viewtoleft_have_client,0
bind=SUPER,Down,viewtoright,0
#bind=CTRL,Right,viewtoright_have_client,0
#bind=CTRL+SUPER,Left,tagtoleft,0
#bind=CTRL+SUPER,Right,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=SUPER+SHIFT,1,tagsilent,1
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=SUPER,t,incgaps,1
bind=SUPER,y,incgaps,-1
bind=ALT+SHIFT,R,togglegaps
bind=SUPER,bracketright,resizewin,+50
bind=SUPER,bracketleft,resizewin,-50

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# NONE mode key only work in ov mode
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
# mousebind=NONE,btn_left,toggleoverview,1
# mousebind=NONE,btn_right,killclient,0

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

